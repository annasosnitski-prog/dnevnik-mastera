<!doctype html>
<html lang="ru" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0D0B08" />
    <meta name="description" content="INKA — Дневник Мастера: клиенты, сессии и документы татуировщика" />
    <link rel="manifest" href="/manifest.json" />
    <script>
      // Apply the saved theme before first paint to avoid a flash of the wrong palette.
      try {
        var t = localStorage.getItem('inka-theme');
        if (t !== 'light' && t !== 'dark') t = 'dark';
        document.documentElement.setAttribute('data-theme', t);
        if (t === 'light') {
          document.documentElement.style.background = '#E4E1D8';
          var m = document.querySelector('meta[name="theme-color"]');
          if (m) m.setAttribute('content', '#E4E1D8');
        }
      } catch (e) {}
    </script>
    <!-- iOS: makes "Add to Home Screen" open without Safari's browser chrome -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="INKA" />
    <title>INKA — Дневник Мастера</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Kelly+Slab&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,600&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        background: #0D0B08;
        height: 100%;
        /* iOS Safari's address bar resizing makes 100vh unreliable; dvh tracks the real visible area */
        overscroll-behavior-y: none;
      }

      body {
        font-family: 'JetBrains Mono', monospace;
        color: #EDE4CC;
      }

      #root {
        width: 100%;
        height: 100vh;
        height: 100dvh;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
